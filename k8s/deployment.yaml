apiVersion: apps/v1
kind: Deployment
metadata:
  name: beacon-priorauth
  namespace: beacon
  labels:
    app: beacon-priorauth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: beacon-priorauth
  template:
    metadata:
      labels:
        app: beacon-priorauth
    spec:
      serviceAccountName: beacon-sa
      containers:
        - name: priorauth-app
          image: 747675253087.dkr.ecr.us-west-2.amazonaws.com/beacon-priorauth:latest
          ports:
            - containerPort: 8000
          env:
            - name: S3_BUCKET
              value: "beacon-priorauthai-assets"
            - name: AWS_REGION
              value: "us-west-2"
            - name: BEDROCK_MODEL
              value: "amazon.nova-lite-v1:0"
            - name: QDRANT_URL
              value: "http://qdrant.beacon.svc.cluster.local:6333"
            - name: NEO4J_URI
              value: "bolt://neo4j.beacon.svc.cluster.local:7687"
            - name: NEO4J_USER
              value: "neo4j"
            - name: NEO4J_PASSWORD
              value: "beacon-graph-2024"
            - name: CRF_EVIDENCE_PREFIX
              value: "clinical-evidence/"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /agent/policies
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /agent/policies
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30

      volumes: []
