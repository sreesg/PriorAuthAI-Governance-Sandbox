apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j
  namespace: beacon
  labels:
    app: neo4j
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
        - name: neo4j
          image: neo4j:5.19-community
          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
          env:
            - name: NEO4J_AUTH
              value: "neo4j/beacon-graph-2024"
            - name: NEO4J_dbms_memory_heap_initial__size
              value: "256m"
            - name: NEO4J_dbms_memory_heap_max__size
              value: "512m"
            - name: NEO4J_dbms_memory_pagecache_size
              value: "256m"
            - name: NEO4J_server_default__listen__address
              value: "0.0.0.0"
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 90
            periodSeconds: 30
      volumes:
        - name: neo4j-data
          emptyDir:
            sizeLimit: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: beacon
spec:
  selector:
    app: neo4j
  ports:
    - name: http
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687
