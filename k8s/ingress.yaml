apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: beacon-priorauth-ingress
  namespace: beacon
  annotations:
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-west-2:747675253087:certificate/213f173c-5003-4a61-bcd0-176b49ae92ee
    alb.ingress.kubernetes.io/group.name: mededatalake-sandbox
    alb.ingress.kubernetes.io/healthcheck-path: /agent/policies
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=300
    alb.ingress.kubernetes.io/target-group-attributes: deregistration_delay.timeout_seconds=30
spec:
  ingressClassName: alb
  rules:
    - host: beacon.sbxaws.medeanalytics.zone
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: beacon-priorauth-svc
                port:
                  number: 80
